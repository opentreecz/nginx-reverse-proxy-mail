####################################################################
# Main nginx configuration.
#
# Rendered from this template by docker/entrypoint.sh (envsubst) into
# /etc/nginx/nginx.conf at container start. Only ${NGINX_WORKER_PROCESSES}
# is substituted here; everything else is static.
#
# See docs/architecture.md for why the mail/XMPP/NNTP ports are proxied
# with the `stream` module (generic TCP + optional TLS termination) rather
# than the `mail` module (which requires an HTTP auth backend and does not
# proxy arbitrary IMAP/POP3/SMTP traffic).
####################################################################

user nginx;
worker_processes ${NGINX_WORKER_PROCESSES};
worker_rlimit_nofile 65535;

pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log notice;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

####################################################################
# HTTP context: ports 80 / 443 / 8443
####################################################################
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    keepalive_timeout  65s;
    client_max_body_size 64m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Shared SSL session cache for every HTTPS server block (443, 8443).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/http/*.conf;
}

####################################################################
# Stream context: SMTP/IMAP/POP3/NNTP/XMPP + custom TCP ports
####################################################################
stream {
    log_format stream_main '$remote_addr [$time_local] '
                            '$protocol $status $bytes_sent $bytes_received '
                            '$session_time "$upstream_addr" "$ssl_preread_server_name"';
    access_log /var/log/nginx/stream-access.log stream_main;
    error_log  /var/log/nginx/stream-error.log notice;

    # Shared SSL session cache for every stream server block that
    # terminates TLS itself (465/993/995/563/5223).
    ssl_session_cache   shared:StreamSSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/conf.d/stream/*.conf;
}
