name: Scheduled rebuild

# Two independent concerns, both required by the "keep this current"
# requirement in docs/release-process.md:
#
# 1. check-versions: is there a newer *stable* nginx or OpenSSL release than
#    what docker/NGINX_VERSION / docker/OPENSSL_VERSION pin? If so, open a PR
#    bumping them (merging + tagging it triggers a real release via
#    release.yml).
#
# 2. nightly-rebuild: rebuild the image from scratch every week regardless,
#    with no build cache and a fresh `debian:stable-slim` pull, so it always
#    carries the latest Debian security patches even between nginx/OpenSSL
#    version bumps. Published only as the mutable `:nightly` tag - never as
#    a versioned release.

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-versions:
    name: Check for newer nginx/OpenSSL stable releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine latest stable versions
        id: latest
        run: |
          echo "nginx=$(./scripts/check-latest-versions.sh nginx)" >> "$GITHUB_OUTPUT"
          echo "openssl=$(./scripts/check-latest-versions.sh openssl)" >> "$GITHUB_OUTPUT"

      - name: Update version pin files
        run: |
          echo "${{ steps.latest.outputs.nginx }}" > docker/NGINX_VERSION
          echo "${{ steps.latest.outputs.openssl }}" > docker/OPENSSL_VERSION

      - name: Open pull request if versions changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump nginx/OpenSSL pinned versions"
          title: "chore: bump nginx to ${{ steps.latest.outputs.nginx }}, OpenSSL to ${{ steps.latest.outputs.openssl }}"
          body: |
            Automated version check found newer stable releases:

            - nginx: `${{ steps.latest.outputs.nginx }}`
            - OpenSSL: `${{ steps.latest.outputs.openssl }}`

            Merging this (and tagging a release) rebuilds the image from
            these sources — see docs/release-process.md.
          branch: chore/bump-nginx-openssl-versions
          delete-branch: true
          labels: dependencies

  nightly-rebuild:
    name: Nightly rebuild (base image freshness)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read pinned build versions
        id: pins
        run: |
          echo "nginx=$(cat docker/NGINX_VERSION)" >> "$GITHUB_OUTPUT"
          echo "openssl=$(cat docker/OPENSSL_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build and push nightly image (no cache, fresh base pull)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          pull: true
          no-cache: true
          tags: ghcr.io/${{ github.repository }}:nightly
          build-args: |
            NGINX_VERSION=${{ steps.pins.outputs.nginx }}
            OPENSSL_VERSION=${{ steps.pins.outputs.openssl }}
